<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>
<style>
body {
	font-family: Arial, sans-serif;
	background-color: #f0f2f5;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	margin: 0;
}

#rzp-button1 {
	padding: 15px 30px;
	font-size: 1rem;
	font-weight: bold;
	color: white;
	background: linear-gradient(45deg, #0095f6, #006ce0);
	border: none;
	border-radius: 8px;
	cursor: pointer;
	transition: all 0.3s ease;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

#rzp-button1:hover {
	transform: translateY(-2px);
	box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
}

@media ( max-width : 450px) {
	#rzp-button1 {
		padding: 12px 24px;
		font-size: 0.9rem;
	}
}
</style>
</head>
<body>
	<button id="rzp-button1"
		th:attr="data-key=${key},
             data-amount=${amount},
             data-currency=${currency},
             data-order=${orderId},
             data-name=${session.user.firstname},
             data-email=${session.user.email},
             data-contact=${session.user.mobile}">
		Pay with Razorpay</button>

	<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

	<script>
		document.getElementById('rzp-button1').onclick = function(e) {

			var btn = e.target;

			var options = {
				key : btn.getAttribute("data-key"),
				amount : parseInt(btn.getAttribute("data-amount")),
				currency : btn.getAttribute("data-currency"),
				order_id : btn.getAttribute("data-order"),
				name : "JspGram",
				description : "Pay to become prime member",
				prefill : {
					name : btn.getAttribute("data-name"),
					email : btn.getAttribute("data-email"),
					contact : btn.getAttribute("data-contact")
				},
				theme : {
					color : "#0095f6"
				}
			};

			var rzp1 = new Razorpay(options);
			rzp1.open();

			e.preventDefault();
		};
	</script>
</body>
</html>
